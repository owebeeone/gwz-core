name: Release
permissions:
  "contents": "read"

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to verify, e.g. v0.1.0"
        required: true
        type: string

env:
  RUST_TOOLCHAIN: "1.95.0"
  TAUT_PYTHON: python

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - windows-2022
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
          fetch-depth: 0
          persist-credentials: false
      - id: release-tag
        name: Resolve release tag
        shell: bash
        run: |
          tag="${{ github.event.release.tag_name || inputs.tag }}"
          case "$tag" in
            v[0-9]*.[0-9]*.[0-9]*)
              ;;
            *)
              echo "release tag must look like v0.1.0, got '$tag'" >&2
              exit 1
              ;;
          esac
          git rev-parse --verify "refs/tags/$tag"
      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component clippy --component rustfmt
          rustup default "$RUST_TOOLCHAIN"
      - name: Show Rust version
        run: rustc --version
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install taut-proto
        run: python -m pip install --upgrade pip "taut-proto==0.8.1"
      - name: Format
        if: runner.os == 'Linux'
        shell: bash
        run: |
          if ! cargo fmt --check; then
            echo "::error title=rustfmt check failed::Run 'cargo fmt' from the gwz-core repo root, then commit the formatting changes."
            echo "Suggested fix:"
            echo "  cargo fmt"
            exit 1
          fi
      - name: Test
        run: cargo test --locked
      - name: Clippy
        if: runner.os == 'Linux'
        run: cargo clippy --all-targets -- -D warnings
